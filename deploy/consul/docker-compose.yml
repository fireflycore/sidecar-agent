services:
  consul:
    image: consul:1.21
    command:
      - agent
      - -server
      - -bootstrap-expect=1
      - -node=consul-server-1
      - -bind=0.0.0.0
      - -client=0.0.0.0
      - -ui
      - -datacenter=dc1
      - -data-dir=/consul/data
    volumes:
      - consul-data:/consul/data
    ports:
      - "8500:8500"
    restart: unless-stopped

volumes:
  consul-data:
